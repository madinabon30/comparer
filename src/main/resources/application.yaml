spring:
  application:
    name: comparer
  datasource:
    url: jdbc:postgresql://localhost:5432/appdb
    username: postgres
    password: postgrespass
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

management:
  endpoints:
    web:
      exposure:
        include: health,info